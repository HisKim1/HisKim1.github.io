<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hisu Kim</title>
  <script>
    (() => {
      const key = 'theme-preference';
      const stored = localStorage.getItem(key);
      const prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
      const theme = stored === 'light' || stored === 'dark' ? stored : (prefersLight ? 'light' : 'dark');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/npm/pretendard/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.16/dist/lenis.min.js"></script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-top">
        <button class="theme-toggle" type="button" aria-label="Toggle theme" aria-pressed="false">
          <span class="theme-toggle-track" aria-hidden="true">
            <i class="fas fa-sun  theme-icon-sun"></i>
            <span class="theme-toggle-thumb"></span>
            <i class="fas fa-moon theme-icon-moon"></i>
          </span>
        </button>
      </div>
      <div class="sidebar-profile">
        <div id="home-section"></div>
        <div class="sidebar-social">
          <a href="mailto:tomm1203@gm.gist.ac.kr" aria-label="Email"><i class="fas fa-envelope"></i><span class="social-label">Email</span></a>
          <a href="https://github.com/HisKim1" target="_blank" rel="noopener noreferrer" aria-label="GitHub"><i class="fab fa-github"></i><span class="social-label">GitHub</span></a>
          <a href="https://www.linkedin.com/in/hisu-kim/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn"><i class="fab fa-linkedin"></i><span class="social-label">LinkedIn</span></a>
          <a href="https://scholar.google.com/citations?user=4z2u1DIAAAAJ&hl=en" target="_blank" rel="noopener noreferrer" aria-label="Google Scholar"><i class="fas fa-graduation-cap"></i><span class="social-label">Scholar</span></a>
          <a href="https://www.overleaf.com/read/rsztdfqtbprb#a6f7d3" target="_blank" rel="noopener noreferrer" aria-label="CV"><i class="fas fa-file-lines"></i><span class="social-label">CV</span></a>
        </div>
      </div>
    </aside>

    <main class="content-area" id="content-area">
      <div class="content-scroll-body">
        <section id="research" aria-label="Research">
          <article class="research-panel section-glass-panel" id="research-featured-panel" style="display:none">
            <h2>Recently Updated</h2>
            <div id="research-featured"></div>
          </article>
          <div class="research-columns">
            <article class="research-panel section-glass-panel">
              <h2>Publications</h2>
              <div id="research-publications"></div>
            </article>
            <article class="research-panel section-glass-panel">
              <h2>Conferences</h2>
              <div id="research-conferences"></div>
            </article>
          </div>
          <article class="research-panel section-glass-panel">
            <h2>Experience</h2>
            <div id="research-experience" class="vertical"></div>
          </article>
        </section>

        <section id="projects" aria-label="Projects">
          <div class="section-glass-panel">
            <h2>Projects</h2>
            <div id="project-grid" class="vertical"></div>
          </div>
        </section>

        <section id="teaching" aria-label="Teaching">
          <div class="section-glass-panel">
            <h2>Teaching</h2>
            <div id="teaching-list" class="teaching-grid"></div>
          </div>
        </section>

        <section id="background" aria-label="Background">
          <div class="section-glass-panel">
            <h2>Background</h2>
            <div id="education-list" class="vertical"></div>
          </div>
        </section>

        <section id="beyond-lab" aria-label="Beyond the Lab">
          <div class="section-glass-panel">
            <h2>Beyond the Lab</h2>
            <p id="beyond-intro" class="beyond-intro"></p>
            <div id="beyond-gallery"></div>
          </div>
        </section>
      </div>
    </main>

    <!-- Dot nav: flex column, always right of content-area -->
    <nav class="dot-nav" aria-label="Section navigation">
<a class="dot-item" data-section="research"   href="#research"  ><span class="dot-label">Research</span><span class="dot-inner"></span></a>
      <a class="dot-item" data-section="projects"   href="#projects"  ><span class="dot-label">Projects</span><span class="dot-inner"></span></a>
      <a class="dot-item" data-section="teaching"   href="#teaching"  ><span class="dot-label">Teaching</span><span class="dot-inner"></span></a>
      <a class="dot-item" data-section="background" href="#background"><span class="dot-label">About</span><span class="dot-inner"></span></a>
    </nav>
  </div>

  <!-- Mobile-only footer (shown only on small screens) -->
  <div class="mobile-page-footer">
    <footer>
      Built by Hisu Kim on GitHub Pages
    </footer>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
